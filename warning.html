<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유해 사이트 차단됨</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #b71c1c;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      color: #212121;
      border-radius: 12px;
      max-width: 580px;
      width: 100%;
      padding: 40px 40px 32px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .shield {
      width: 64px;
      height: 64px;
      background: #b71c1c;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #b71c1c;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #555;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .prob-badge {
      display: inline-block;
      background: #ffebee;
      color: #b71c1c;
      font-weight: 700;
      font-size: 15px;
      border-radius: 6px;
      padding: 6px 14px;
      margin-bottom: 20px;
    }

    .url-box {
      background: #f5f5f5;
      border-left: 4px solid #b71c1c;
      border-radius: 4px;
      padding: 10px 14px;
      font-size: 13px;
      color: #444;
      word-break: break-all;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .url-label {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 22px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }

    .btn-back {
      background: #1565c0;
      color: #fff;
      flex: 1;
    }

    .btn-proceed {
      background: transparent;
      color: #888;
      border: 1px solid #ccc;
      font-weight: 400;
    }

    .footer {
      margin-top: 24px;
      font-size: 11px;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="shield">🛡</div>
    <h1>유해 사이트가 차단되었습니다</h1>
    <p class="subtitle">
      PillsAI가 이 사이트를 유해 사이트로 판단했습니다.<br>
      개인정보, 계좌번호, 비밀번호를 절대 입력하지 마세요.
    </p>

    <div class="prob-badge" id="prob-badge">악성 확률: —</div>

    <div class="url-box">
      <div class="url-label">차단된 URL</div>
      <div id="blocked-url">—</div>
    </div>

    <div class="actions">
      <button class="btn btn-back" id="btn-back">← 이전 페이지로 돌아가기</button>
      <button class="btn btn-proceed" id="btn-proceed">위험을 감수하고 계속</button>
    </div>

    <div class="footer">필상 AI 유해 사이트 탐지 · PillsAI Web Protection</div>
  </div>
  <script src="warning.js"></script>
</body>
</html>
